{% extends "mobile_base.html" %}

{% block page_title %}Новый клиент{% endblock %}

{% block content %}
<form id="addClientForm">
    <!-- Основная информация -->
    <div class="card">
        <div class="card-header">
            <div class="card-title">
                <i class="fas fa-user"></i>
                Основная информация
            </div>
        </div>
        
        <div class="form-group">
            <label class="form-label">Полное имя *</label>
            <input type="text" name="full_name" class="form-control" required placeholder="Иван Петров">
        </div>
        
        <div class="form-group">
            <label class="form-label">Компания</label>
            <input type="text" name="company" class="form-control" placeholder="ООО &quot;Пример&quot;">
        </div>
        
        <div class="form-group">
            <label class="form-label">Комментарий</label>
            <textarea name="comment" class="form-control" rows="3" placeholder="Дополнительная информация о клиенте..."></textarea>
        </div>
    </div>

    <!-- Контактная информация -->
    <div class="card">
        <div class="card-header">
            <div class="card-title">
                <i class="fas fa-address-book"></i>
                Контакты
            </div>
        </div>
        
        <div class="form-group">
            <label class="form-label">Telegram username</label>
            <input type="text" name="telegram_username" class="form-control" placeholder="username (без @)">
        </div>
        
        <div class="form-group">
            <label class="form-label">ID чата Telegram</label>
            <input type="text" name="telegram_chat_id" class="form-control" placeholder="123456789">
            <small class="text-muted">Введите вручную для возможности отправки сообщений</small>
        </div>
        
        <div class="form-group">
            <label class="form-label">Телефон</label>
            <input type="tel" name="phone" class="form-control" placeholder="+7 (999) 123-45-67">
        </div>
        
        <div class="form-group">
            <label class="form-label">Email</label>
            <input type="email" name="email" class="form-control" placeholder="client@example.com">
        </div>
    </div>

    <!-- Кнопки действий -->
    <div class="card">
        <div class="d-flex gap-2">
            <a href="{{ url_for('clients_list') }}" class="btn btn-secondary" style="flex: 1;">
                <i class="fas fa-arrow-left"></i> Отмена
            </a>
            <button type="submit" class="btn btn-primary" style="flex: 2;">
                <i class="fas fa-save"></i> Сохранить клиента
            </button>
        </div>
    </div>
</form>

<script>
// Обработка формы добавления клиента
handleFormSubmit('addClientForm', '/clients/add', function(result) {
    if (result.client_id) {
        showNotification('Клиент успешно создан!');
        setTimeout(() => {
            window.location.href = `/clients/${result.client_id}`;
        }, 1000);
    }
});

// Автоматическое форматирование телефона
document.querySelector('input[name="phone"]').addEventListener('input', function(e) {
    let value = e.target.value.replace(/\D/g, '');
    if (value.startsWith('7')) {
        value = value.substring(1);
    }
    if (value.length > 0) {
        if (value.length <= 3) {
            e.target.value = `+7 (${value}`;
        } else if (value.length <= 6) {
            e.target.value = `+7 (${value.substring(0, 3)}) ${value.substring(3)}`;
        } else if (value.length <= 8) {
            e.target.value = `+7 (${value.substring(0, 3)}) ${value.substring(3, 6)}-${value.substring(6)}`;
        } else {
            e.target.value = `+7 (${value.substring(0, 3)}) ${value.substring(3, 6)}-${value.substring(6, 8)}-${value.substring(8, 10)}`;
        }
    }
});

// Автоматическое удаление @ из username
document.querySelector('input[name="telegram_username"]').addEventListener('input', function(e) {
    e.target.value = e.target.value.replace('@', '');
});
</script>
{% endblock %}
