{% extends "mobile_base.html" %}

{% block page_title %}Редактировать клиента{% endblock %}

{% block content %}
<form id="editClientForm">
    <!-- Основная информация -->
    <div class="card">
        <div class="card-header">
            <div class="card-title">
                <i class="fas fa-user"></i>
                Основная информация
            </div>
        </div>
        
        <div class="form-group">
            <label class="form-label">Полное имя *</label>
            <input type="text" name="full_name" class="form-control" required value="{{ client.full_name or '' }}">
        </div>
        
        <div class="form-group">
            <label class="form-label">Компания</label>
            <input type="text" name="company" class="form-control" value="{{ client.company or '' }}">
        </div>
        
        <div class="form-group">
            <label class="form-label">Комментарий</label>
            <textarea name="comment" class="form-control" rows="3">{{ client.comment or '' }}</textarea>
        </div>
    </div>

    <!-- Контактная информация -->
    <div class="card">
        <div class="card-header">
            <div class="card-title">
                <i class="fas fa-address-book"></i>
                Контакты
            </div>
        </div>
        
        <div class="form-group">
            <label class="form-label">Telegram username</label>
            <input type="text" name="telegram_username" class="form-control" value="{{ client.telegram_username or '' }}">
        </div>
        
        <div class="form-group">
            <label class="form-label">ID чата Telegram</label>
            <input type="text" name="telegram_chat_id" class="form-control" value="{{ client.telegram_chat_id or '' }}">
            <small class="text-muted">Для отправки сообщений боту</small>
        </div>
        
        <div class="form-group">
            <label class="form-label">Телефон</label>
            <input type="tel" name="phone" class="form-control" value="{{ client.phone or '' }}">
        </div>
        
        <div class="form-group">
            <label class="form-label">Email</label>
            <input type="email" name="email" class="form-control" value="{{ client.email or '' }}">
        </div>
    </div>

    <!-- Кнопки действий -->
    <div class="card">
        <div class="d-flex gap-2">
            <a href="{{ url_for('client_detail', client_id=client.id) }}" class="btn btn-secondary" style="flex: 1;">
                <i class="fas fa-arrow-left"></i> Отмена
            </a>
            <button type="submit" class="btn btn-primary" style="flex: 2;">
                <i class="fas fa-save"></i> Сохранить изменения
            </button>
        </div>
    </div>
</form>

<script>
// Обработка формы редактирования клиента
handleFormSubmit('editClientForm', '/clients/{{ client.id }}/edit', function(result) {
    showNotification('Данные клиента обновлены!');
    setTimeout(() => {
        window.location.href = `/clients/{{ client.id }}`;
    }, 1000);
});
</script>
{% endblock %}
